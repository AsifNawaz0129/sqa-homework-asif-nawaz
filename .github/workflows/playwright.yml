name: Playwright Tests & Report

on:
  push:
    branches: [ main ] # Runs on pushes to the main branch
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 24.x
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - name: Upload report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

  deploy-report:
    # Deploy the report to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allow write permission to deploy to gh-pages
    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-report
          # The following options are optional, but recommended
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Playwright report'
          # By default, this action pushes to the 'gh-pages' branch.
          # You can change this with the 'publish_branch' option.
